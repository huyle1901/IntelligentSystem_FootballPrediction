# In terminal 
# conda env create -f aifootball_predictions.yaml
# pip list --format=freeze > requirements.txt
name: aifootball_predictions
channels:
  - anaconda
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - ipykernel
  - nodejs>=20.0
  - npm>=10.0
  - cudatoolkit=11.2
  - cudnn=8.1.0
  - pip:
    - fastapi==0.116.0
    - uvicorn[standard]==0.33.0
    - requests>=2.32
    - python-dotenv>=1.0.1
    - pandas>=2.0.3
    - numpy>=1.24.4
    - scipy>=1.10.1
    - scikit-learn>=1.3.2
    - xgboost>=2.1.4
    - mrmr-selection>=0.2.8
    - invoke>=2.2

